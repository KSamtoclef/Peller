<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Peller & Jarvis Campaign Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/admin.css?v=2" />
</head>
<body>
  <header class="admin-header"><div><span class="eyebrow">BROWSER-LOCAL ADMIN PREVIEW</span><h1>3-Day Reward Journey Manager</h1><p>Edit day rewards, chat goals, sponsored URLs and local request statuses.</p></div><a class="site-link" href="index.html?preview=1">Open preview</a></header>
  <main class="admin-shell">
    <section class="warning">This manager is not a secure production backend. Changes and user records are stored only in this browser.</section>
    <section id="summaryGrid" class="summary-grid"></section>
    <nav class="tabs"><button data-tab="days" class="active">Day Settings</button><button data-tab="requests">Requests</button><button data-tab="analytics">Analytics</button><button data-tab="data">Import / Export</button></nav>
    <section id="daysTab" class="tab-panel"><div class="toolbar"><select id="dayFilter"><option value="1">Day 1</option><option value="2">Day 2</option><option value="3">Day 3</option></select><button id="saveDay" class="primary">Save changes</button></div><div id="dayEditor"></div></section>
    <section id="requestsTab" class="tab-panel hidden"><div id="requestEditor"></div></section>
    <section id="analyticsTab" class="tab-panel hidden"><div id="analyticsView"></div></section>
    <section id="dataTab" class="tab-panel hidden"><div class="data-actions"><button id="exportConfig">Export configuration</button><label class="file-btn">Import configuration<input id="importConfig" type="file" accept="application/json" /></label><button id="resetOverrides" class="danger">Reset overrides</button><button id="clearProgress" class="danger">Clear journey progress</button></div><textarea id="configPreview" rows="20" readonly></textarea></section>
  </main>
  <template id="dayTemplate"><article class="editor-card"><div class="editor-head"><strong id="dayHeading">Day settings</strong></div><div class="form-grid"><label>Daily cash<input data-field="cash" type="number" min="0" /></label><label>Airtime allocation<input data-field="airtime" type="number" min="0" /></label><label>Data allocation (GB)<input data-field="data" type="number" min="0" /></label><label>Chat goal<input data-field="chatGoal" type="number" min="1" max="20" /></label><label>Chat value<input data-field="chatReward" type="number" min="0" /></label><label>Sponsored value<input data-field="sponsorReward" type="number" min="0" /></label><label>Sharing value<input data-field="shareReward" type="number" min="0" /></label><label>Completion bonus<input data-field="bonusReward" type="number" min="0" /></label><label class="wide">Sponsored title<input data-field="sponsorTitle" /></label><label class="wide">Sponsored URL<input data-field="sponsorUrl" placeholder="PASTE_APPROVED_URL_HERE" /></label><label class="wide">Published requirement<textarea data-field="requirement" rows="3"></textarea></label></div></article></template>
  <script src="js/config.js?v=9"></script><script src="js/config-loader.js?v=2"></script><script src="js/admin.js?v=2"></script>
</body>
</html>
